<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevBeauty — Protótipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: oklch(97% 0.012 75);
    --blush: oklch(88% 0.055 10);
    --blush-mid: oklch(82% 0.075 12);
    --rose: oklch(68% 0.1 10);
    --gold: oklch(72% 0.115 75);
    --gold-light: oklch(88% 0.07 80);
    --mauve: oklch(36% 0.06 340);
    --mauve-dark: oklch(24% 0.05 340);
    --text: oklch(22% 0.04 340);
    --text-mid: oklch(50% 0.04 340);
    --text-light: oklch(72% 0.025 340);
    --white: oklch(99% 0.005 75);
    --border: oklch(90% 0.02 75);
  }
  html, body { width: 100%; min-height: 100vh; background: var(--cream); font-family: 'Poppins', sans-serif; color: var(--text); }
  #root { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "sage",
  "fontStyle": "dm",
  "density": "comfortable",
  "accentGold": true,
  "animationsOn": true
}/*EDITMODE-END*/;

// ── Icons (inline SVG) ─────────────────────────────────────────────────────
const Icon = ({ name, size = 18, color = "currentColor", style = {} }) => {
  const icons = {
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    scissors: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    mapPin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    home2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    chevronRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
    chevronLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    dollar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
    bar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    bell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    credit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
    pix: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M12 2l2.5 4.5L19 5l-1.5 4.5 4 2.5-4 2.5L19 19l-4.5-1.5L12 22l-2.5-4.5L5 19l1.5-4.5-4-2.5 4-2.5L5 5l4.5 1.5z" opacity="0.85"/></svg>,
    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    package: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l9 4.5v11L12 22l-9-4.5v-11L12 2z"/><line x1="12" y1="22" x2="12" y2="11.5"/><polyline points="21 6.5 12 11.5 3 6.5"/><line x1="3" y1="17.5" x2="12" y2="12.5"/></svg>,
    info: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
  };
  return <span style={{display:'inline-flex',alignItems:'center',...style}}>{icons[name] || null}</span>;
};

// ── Format helpers ──────────────────────────────────────────────────────────
const fmt = (v) => v.toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
const pct = (v) => `${v.toFixed(1)}%`;

// ─────────────────────────────────────────────────────────────────────────────
// CLIENT APP (Mobile)
// ─────────────────────────────────────────────────────────────────────────────

const services = [
  { id:1, name:'Alongamento em Gel', duration:'2h 30min', price:180, icon:'', rating:4.9, desc:'Unhas longas e naturais com gel resistente.' },
  { id:2, name:'Banho de Gel', duration:'1h 30min', price:120, icon:'', rating:4.8, desc:'Capa protetora de gel brilhante sobre as unhas naturais.' },
  { id:3, name:'Esmaltação em Gel', duration:'1h', price:90, icon:'', rating:4.9, desc:'Esmalte em gel de longa duração, até 3 semanas.' },
  { id:4, name:'Manutenção', duration:'1h 15min', price:80, icon:'', rating:4.7, desc:'Manutenção do alongamento com preenchimento.' },
];

const timeSlots = ['09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];

function ClientApp({ tweaks, salonConfig }) {
  const [screen, setScreen] = React.useState('home');
  const [selectedService, setSelectedService] = React.useState(null);
  const [selectedDate, setSelectedDate] = React.useState(null);
  const [selectedTime, setSelectedTime] = React.useState(null);
  const [location, setLocation] = React.useState('salon');
  const [payment, setPayment] = React.useState('pix');
  const [activeTab, setActiveTab] = React.useState('home');
  const [calendarMonth, setCalendarMonth] = React.useState(4);
  const [booked, setBooked] = React.useState(false);
  const [clientCep, setClientCep] = React.useState('');
  const [cepChecked, setCepChecked] = React.useState(false);
  const [cepDistance, setCepDistance] = React.useState(null);
  const [cepError, setCepError] = React.useState('');

  const cfg = salonConfig || defaultSalonConfig;

  const checkCep = () => {
    const cleaned = clientCep.replace(/\D/g,'');
    if(cleaned.length < 8) { setCepError('CEP inválido. Digite os 8 dígitos.'); return; }
    const dist = estimateDistance(cleaned, cfg.cepBase);
    setCepDistance(dist);
    setCepChecked(true);
    if(dist > cfg.maxRadiusKm) {
      setCepError(`Seu CEP está a ${dist.toFixed(1)} km — fora do raio de ${cfg.maxRadiusKm} km.`);
    } else {
      setCepError('');
    }
  };

  const travelFee = React.useMemo(() => {
    if(location !== 'home') return 0;
    if(!cepChecked || cepDistance === null || cepDistance > cfg.maxRadiusKm) return 0;
    return Math.max(cfg.minTravelFee, cepDistance * 2 * cfg.pricePerKm);
  }, [location, cepChecked, cepDistance, cfg]);

  const homeAvailable = cfg.homeEnabled && cepChecked && cepDistance !== null && cepDistance <= cfg.maxRadiusKm;
  const cardFee = payment === 'credit' ? (selectedService ? selectedService.price * 0.0329 : 0) : 0;
  const total = selectedService ? selectedService.price + travelFee + cardFee : 0;

  // Block 2h buffer in time slots for home visits
  const getAvailableSlots = () => {
    if(location !== 'home') return timeSlots;
    // For home visits, filter out last 2 slots to simulate 2h block before next appt
    return timeSlots.slice(0, -4);
  };

  const goTo = (s) => { setScreen(s); setActiveTab(s === 'home' ? 'home' : s === 'agenda' ? 'agenda' : s); };

  const daysInMonth = 31;
  const firstDay = 4; // Thursday May 1
  const today = 4;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--white)',overflow:'hidden',fontFamily:tweaks.fontStyle==='dm'?'Poppins, sans-serif':"'Playfair Display', 'Poppins', sans-serif"}}>
      {/* Scrollable content */}
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>

        {/* HOME */}
        {screen === 'home' && (
          <div>
            {/* Header */}
            <div style={{background:'linear-gradient(160deg, oklch(88% 0.055 10), oklch(82% 0.065 350))',padding:'28px 20px 32px',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:'50%',background:'oklch(95% 0.04 75 / 0.4)'}}></div>
              <div style={{position:'absolute',bottom:-20,left:10,width:80,height:80,borderRadius:'50%',background:'oklch(72% 0.115 75 / 0.2)'}}></div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'relative'}}>
                <div>
                  <p style={{fontFamily:"'Poppins'",fontSize:13,color:'oklch(40% 0.05 340)',letterSpacing:'0.05em',fontWeight:400}}>Olá, Fernanda </p>
                  <h2 style={{fontFamily:"'Playfair Display'",fontSize:28,fontWeight:600,color:'oklch(22% 0.04 340)',marginTop:2,lineHeight:1.1}}>Pronta para arrasar?</h2>
                </div>
                <div style={{width:40,height:40,borderRadius:'50%',background:'oklch(72% 0.115 75)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name="bell" size={16} color="white"/>
                </div>
              </div>
              <div style={{marginTop:16,background:'white',borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 2px 12px oklch(40% 0.05 10 / 0.12)'}}>
                <Icon name="calendar" size={16} color="var(--gold)"/>
                <div>
                  <p style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Poppins'"}}>Próximo agendamento</p>
                  <p style={{fontSize:13,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'",marginTop:1}}>Alongamento em Gel · Seg, 12 Mai · 10:00</p>
                </div>
              </div>
            </div>

            {/* Services */}
            <div style={{padding:'22px 20px 0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <h3 style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:600,color:'var(--text)'}}>Nossos Serviços</h3>
                <span style={{fontSize:12,color:'var(--gold)',fontWeight:500,fontFamily:"'Poppins'",cursor:'pointer'}}>Ver todos</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {services.map(svc => (
                  <div key={svc.id} onClick={() => {setSelectedService(svc);setScreen('book-service');}}
                    style={{background:'white',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,boxShadow:'0 1px 8px oklch(40% 0.05 340 / 0.07)',cursor:'pointer',border:'1px solid var(--border)',transition:'transform 0.15s',':hover':{transform:'scale(1.01)'}}}>
                    <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg, oklch(92% 0.045 10), oklch(88% 0.06 350))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
                      {svc.icon}
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontFamily:"'Poppins'",fontWeight:600,fontSize:14,color:'var(--text)'}}>  {svc.name}</p>
                      <div style={{display:'flex',gap:10,marginTop:3,alignItems:'center'}}>
                        <span style={{fontSize:12,color:'var(--text-light)',fontFamily:"'Poppins'",display:'flex',alignItems:'center',gap:3}}><Icon name="clock" size={11} color="var(--text-light)"/> {svc.duration}</span>
                        <span style={{fontSize:12,color:'var(--gold)',fontWeight:600,fontFamily:"'Poppins'"}}>{fmt(svc.price)}</span>
                      </div>
                    </div>
                    <Icon name="chevronRight" size={16} color="var(--text-light)"/>
                  </div>
                ))}
              </div>
            </div>

            {/* Recent */}
            <div style={{padding:'22px 20px 24px'}}>
              <h3 style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:600,color:'var(--text)',marginBottom:12}}>Histórico</h3>
              {[{s:'Esmaltação em Gel',d:'15 Abr',p:90},{s:'Manutenção',d:'02 Abr',p:80}].map((h,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500,fontFamily:"'Poppins'",color:'var(--text)'}}>{h.s}</p>
                    <p style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Poppins'",marginTop:2}}>{h.d}</p>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <p style={{fontSize:13,fontWeight:600,fontFamily:"'Poppins'",color:'var(--mauve)'}}>{fmt(h.p)}</p>
                    <div style={{display:'flex',gap:2,marginTop:3,justifyContent:'flex-end'}}>
                      {[1,2,3,4,5].map(s=><span key={s} style={{fontSize:10,color:'var(--gold)'}}></span>)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* BOOK SERVICE */}
        {screen === 'book-service' && selectedService && (
          <div>
            <div style={{background:`linear-gradient(160deg, oklch(88% 0.055 10), oklch(82% 0.065 350))`,padding:'20px 20px 28px'}}>
              <button onClick={() => setScreen('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:6,marginBottom:16}}>
                <Icon name="chevronLeft" size={18} color="var(--mauve)"/>
                <span style={{fontSize:13,color:'var(--mauve)',fontFamily:"'Poppins'"}}>Voltar</span>
              </button>
              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <div style={{width:56,height:56,borderRadius:16,background:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,boxShadow:'0 2px 12px oklch(40% 0.05 10 / 0.15)'}}>
                  {selectedService.icon}
                </div>
                <div>
                  <h2 style={{fontFamily:"'Playfair Display'",fontSize:24,fontWeight:600,color:'var(--mauve-dark)'}}>{selectedService.name}</h2>
                  <p style={{fontSize:12,color:'var(--text-mid)',fontFamily:"'Poppins'",marginTop:3}}>{selectedService.desc}</p>
                </div>
              </div>
            </div>

            <div style={{padding:'0 20px 24px'}}>
              {/* Location */}
              <div style={{marginTop:20}}>
                <p style={{fontSize:13,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'",marginBottom:10,letterSpacing:'0.03em'}}>LOCAL DO ATENDIMENTO</p>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>{setLocation('salon');setCepChecked(false);setCepDistance(null);setCepError('');}}
                    style={{flex:1,padding:'12px 8px',borderRadius:12,border:`1.5px solid ${location==='salon'?'var(--gold)':'var(--border)'}`,background:location==='salon'?'oklch(95% 0.045 75)':'white',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6,transition:'all 0.15s'}}>
                    <Icon name="scissors" size={18} color={location==='salon'?'var(--gold)':'var(--text-light)'}/>
                    <span style={{fontSize:12,fontWeight:location==='salon'?600:400,color:location==='salon'?'var(--gold)':'var(--text-mid)',fontFamily:"'Poppins'"}}>No Salão</span>
                  </button>
                  {cfg.homeEnabled && (
                    <button onClick={()=>setLocation('home')}
                      style={{flex:1,padding:'12px 8px',borderRadius:12,border:`1.5px solid ${location==='home'?'var(--gold)':'var(--border)'}`,background:location==='home'?'oklch(95% 0.045 75)':'white',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6,transition:'all 0.15s'}}>
                      <Icon name="home2" size={18} color={location==='home'?'var(--gold)':'var(--text-light)'}/>
                      <span style={{fontSize:12,fontWeight:location==='home'?600:400,color:location==='home'?'var(--gold)':'var(--text-mid)',fontFamily:"'Poppins'"}}>Em Casa</span>
                    </button>
                  )}
                </div>

                {/* CEP field for home visits */}
                {location==='home' && (
                  <div style={{marginTop:12,background:'oklch(98% 0.015 75)',borderRadius:12,padding:'14px',border:'1px solid var(--border)'}}>
                    <p style={{fontSize:12,fontWeight:500,color:'var(--text)',fontFamily:"'Poppins'",marginBottom:8}}>Informe seu CEP para verificar disponibilidade</p>
                    <div style={{display:'flex',gap:8}}>
                      <input value={clientCep} onChange={e=>{setClientCep(formatCEP(e.target.value));setCepChecked(false);setCepDistance(null);setCepError('');}}
                        placeholder="00000-000" maxLength={9}
                        style={{flex:1,padding:'9px 12px',borderRadius:9,border:`1.5px solid ${cepError?'oklch(60% 0.12 15)':cepChecked&&!cepError?'oklch(55% 0.1 145)':'var(--border)'}`,fontFamily:"'Poppins'",fontSize:13,color:'var(--text)',outline:'none'}}/>
                      <button onClick={checkCep}
                        style={{padding:'9px 14px',borderRadius:9,border:'none',background:'var(--gold)',cursor:'pointer',fontSize:12,fontWeight:600,color:'white',fontFamily:"'Poppins'"}}>
                        Verificar
                      </button>
                    </div>
                    {cepError && (

    <span onClick={onClick}
      style={{fontSize:10,fontWeight:600,fontFamily:"'Poppins'",padding:'4px 11px',borderRadius:10,

function calcPricing(svc, allInputs) {
  const selectedInpCost = svc.inputs.reduce((acc,idx)=> acc + (allInputs[idx] ? computeUnitCost(allInputs[idx]) : 0), 0);
  const deductions = svc.taxPct + svc.cardPct + svc.mktPct + svc.manicurePct;
  const idealPrice = selectedInpCost / (1 - (svc.profitMargin/100) - (deductions/100));
  const grossProfit = idealPrice - selectedInpCost;
  const manicureCost = idealPrice * svc.manicurePct / 100;
  const netProfit = grossProfit - (idealPrice * (svc.taxPct + svc.cardPct + svc.mktPct) / 100) - manicureCost;
  return { selectedInpCost, idealPrice, grossProfit, netProfit, manicureCost };
}

function PricingSection({ inputs, fmt, pct }) {
  const [catalog, setCatalog] = React.useState(defaultServiceCatalog);
  const [selectedId, setSelectedId] = React.useState(1);
  const [modal, setModal] = React.useState(null); // null | 'new' | svc object

  const selected = catalog.find(s=>s.id===selectedId) || catalog[0];
  const { selectedInpCost, idealPrice, grossProfit, netProfit, manicureCost } = calcPricing(selected, inputs);

  const saveService = (draft) => {
    setCatalog(prev => {
      const exists = prev.find(s=>s.id===draft.id);
      return exists ? prev.map(s=>s.id===draft.id?draft:s) : [...prev,draft];
    });
    setSelectedId(draft.id);
    setModal(null);
  };

  const deleteService = (id) => {
    setCatalog(prev=>prev.filter(s=>s.id!==id));
    if(selectedId===id) setSelectedId(catalog[0]?.id);
  };

function CostRow({ cost, onSave, onDelete, fmt }) {
  const [editing, setEditing] = React.useState(false);
  const [draftName, setDraftName] = React.useState(cost.name);
  const [draftVal, setDraftVal] = React.useState(cost.val);

  const save = () => { onSave({...cost, name:draftName, val:Number(draftVal)}); setEditing(false); };
  const cancel = () => { setDraftName(cost.name); setDraftVal(cost.val); setEditing(false); };

  if (editing) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <input value={draftName} onChange={e=>setDraftName(e.target.value)}
          style={{flex:1,padding:'7px 10px',borderRadius:8,border:'1.5px solid var(--gold)',fontFamily:"'Poppins'",fontSize:13,color:'var(--text)',outline:'none'}}/>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{fontSize:12,color:'var(--text-light)',fontFamily:"'Poppins'"}}>R$</span>
          <input type="number" value={draftVal} onChange={e=>setDraftVal(e.target.value)}
            style={{width:90,padding:'7px 10px',borderRadius:8,border:'1.5px solid var(--gold)',fontFamily:"'Poppins'",fontSize:13,color:'var(--text)',outline:'none',textAlign:'right'}}/>
        </div>
        <button onClick={save} style={{padding:'6px 14px',borderRadius:7,border:'none',background:'var(--gold)',cursor:'pointer',fontSize:11,fontWeight:600,color:'white',fontFamily:"'Poppins'"}}>Salvar</button>
        <button onClick={cancel} style={{padding:'6px 10px',borderRadius:7,border:'1.5px solid var(--border)',background:'white',cursor:'pointer',fontSize:11,color:'var(--text-mid)',fontFamily:"'Poppins'"}}></button>
      </div>
    );
  }

  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}
      onMouseEnter={e=>e.currentTarget.querySelector('.row-actions').style.opacity='1'}
      onMouseLeave={e=>e.currentTarget.querySelector('.row-actions').style.opacity='0'}>
      <span style={{fontSize:13,color:'var(--text)',fontFamily:"'Poppins'"}}>{cost.name}</span>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:13,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'"}}>{fmt(cost.val)}</span>
        <div className="row-actions" style={{display:'flex',gap:5,opacity:0,transition:'opacity 0.15s'}}>
          <button onClick={()=>setEditing(true)}
            style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid var(--gold)',background:'oklch(98% 0.04 75)',cursor:'pointer',fontSize:10,fontWeight:600,color:'var(--gold)',fontFamily:"'Poppins'"}}>
            
          </button>
          <button onClick={()=>onDelete(cost.id)}
            style={{padding:'4px 8px',borderRadius:6,border:'1.5px solid oklch(90% 0.04 15)',background:'oklch(99% 0.01 15)',cursor:'pointer',fontSize:10,color:'oklch(50% 0.12 15)',fontFamily:"'Poppins'"}}>
            
          </button>
        </div>
      </div>
    </div>
  );
}

function FinanceiroSection({ fmt }) {
  const [costs, setCosts] = React.useState(initialFixedCosts);
  const [adding, setAdding] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newVal, setNewVal] = React.useState('');
  const [exportModal, setExportModal] = React.useState(false);
  const receita = 6840;

  const totalFixed = costs.reduce((a,c)=>a+c.val,0);
  const resultado = receita - totalFixed;

  const saveCost = (updated) => setCosts(prev=>prev.map(c=>c.id===updated.id?updated:c));
  const deleteCost = (id) => setCosts(prev=>prev.filter(c=>c.id!==id));
  const addCost = () => {
    if(!newName.trim()||!newVal) return;
    setCosts(prev=>[...prev,{id:Date.now(),name:newName.trim(),val:Number(newVal)}]);
    setNewName(''); setNewVal(''); setAdding(false);
  };

  const exportCSV = (period) => {
    const label = period === 'weekly' ? 'Semanal' : 'Mensal';
    const date = period === 'weekly' ? '28 Abr - 04 Mai 2026' : 'Maio 2026';
    const appts = [
      {data:'28/04',cliente:'Ana Costa',servico:'Alongamento em Gel',pagamento:'Pix',valor:180},
      {data:'29/04',cliente:'Mariana Lima',servico:'Banho de Gel',pagamento:'Cartão',valor:120},
      {data:'30/04',cliente:'Julia Santos',servico:'Esmaltação em Gel',pagamento:'Pix',valor:90},
      {data:'01/05',cliente:'Beatriz Rocha',servico:'Manutencao',pagamento:'Presencial',valor:80},
      {data:'02/05',cliente:'Ana Costa',servico:'Banho de Gel',pagamento:'Pix',valor:120},
      ...(period==='monthly'?[
        {data:'05/05',cliente:'Carla Mendes',servico:'Alongamento em Gel',pagamento:'Pix',valor:180},
        {data:'08/05',cliente:'Mariana Lima',servico:'Esmaltação em Gel',pagamento:'Cartão',valor:90},
        {data:'12/05',cliente:'Julia Santos',servico:'Alongamento em Gel',pagamento:'Pix',valor:180},
        {data:'15/05',cliente:'Beatriz Rocha',servico:'Banho de Gel',pagamento:'Pix',valor:120},
        {data:'19/05',cliente:'Ana Costa',servico:'Manutencao',pagamento:'Presencial',valor:80},
      ]:[]),
    ];
    const totalRec = appts.reduce((a,r)=>a+r.valor,0);
    const rows = [
      `LEVBEAUTY — RELATORIO ${label.toUpperCase()}`,
      `Periodo: ${date}`,
      '',
      'Data,Cliente,Servico,Pagamento,Valor (R$)',
      ...appts.map(r=>`${r.data},${r.cliente},${r.servico},${r.pagamento},${r.valor.toFixed(2)}`),
      '',
      `Total Atendimentos,${appts.length}`,
      `Receita Total,${totalRec.toFixed(2)}`,
      '',
      'CUSTOS FIXOS DO MES',
      'Item,Valor (R$)',
      ...costs.map(c=>`${c.name},${c.val.toFixed(2)}`),
      `Total Custos,${totalFixed.toFixed(2)}`,
      '',
      `RESULTADO,${(totalRec - totalFixed).toFixed(2)}`,
    ];
    const csv = rows.join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `LevBeauty_Relatorio_${label}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    setExportModal(false);

    <div style={{padding:'28px 32px'}}>

          <div style={{background:'white',borderRadius:20,padding:'32px',width:420,boxShadow:'0 20px 60px oklch(22% 0.04 340 / 0.25)'}}>

              <h2 style={{fontFamily:"'Playfair Display'",fontSize:24,fontWeight:600,color:'var(--text)'}}>Exportar Relatório</h2>
              <button onClick={()=>setExportModal(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'var(--text-light)',lineHeight:1}}>×</button>
            </div>
            <p style={{fontSize:13,color:'var(--text-mid)',fontFamily:"'Poppins'",marginBottom:20,lineHeight:1.6}}>Escolha o período do relatório. O arquivo CSV pode ser aberto no Excel ou Google Sheets.</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button onClick={()=>exportCSV('weekly')}
                style={{padding:'16px 20px',borderRadius:14,border:'1.5px solid var(--border)',background:'white',cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.background='oklch(98% 0.04 75)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='white';}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:'oklch(96% 0.04 75)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name="calendar" size={18} color="var(--gold)"/>

// Simulated CEP → distance lookup (in a real app, would call ViaCEP + Google Maps)
function estimateDistance(cepClient, cepBase) {
  // Demo: use last 3 digits to generate a plausible distance
  const clientNum = parseInt(cepClient.replace(/\D/g,'').slice(-4)) || 0;
  const baseNum = parseInt(cepBase.replace(/\D/g,'').slice(-4)) || 0;
  const diff = Math.abs(clientNum - baseNum);
  // Map diff to 0-25 km range
  return Math.min(25, Math.round((diff % 200) / 8 * 10) / 10);
}

function formatCEP(v) {
  return v.replace(/\D/g,'').slice(0,8).replace(/^(\d{5})(\d)/, '$1-$2');
}

      <div style={{width:220,background:'white',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'24px 20px 20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,oklch(88% 0.055 10),oklch(72% 0.115 75))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}></div>
            <div>
              <p style={{fontFamily:"'Playfair Display'",fontSize:20,fontWeight:600,color:'var(--mauve-dark)',lineHeight:1}}>LevBeauty</p>
              <p style={{fontSize:10,color:'var(--text-light)',letterSpacing:'0.06em',fontWeight:500}}>GESTÃO</p>
            </div>
          </div>
        </div>
        <nav style={{flex:1,padding:'8px 12px'}}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setActiveSection(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,border:'none',background:activeSection===n.id?'oklch(96% 0.04 75)':'none',cursor:'pointer',marginBottom:2,transition:'background 0.15s',textAlign:'left'}}>
              <Icon name={n.icon} size={16} color={activeSection===n.id?'var(--gold)':'var(--text-light)'}/>
              <span style={{fontSize:13,fontWeight:activeSection===n.id?600:400,color:activeSection===n.id?'var(--text)':'var(--text-mid)',fontFamily:"'Poppins'"}}>{n.label}</span>
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 12px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px'}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,oklch(85% 0.07 10),oklch(72% 0.115 75))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}></div>
            <div>
              <p style={{fontSize:12,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'"}}>Levi Santos</p>
              <p style={{fontSize:10,color:'var(--text-light)',fontFamily:"'Poppins'"}}>Proprietária</p>
            </div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>

        {/* DASHBOARD */}
        {activeSection==='dashboard' && (
          <div style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
              <div>
                <h1 style={{fontFamily:"'Playfair Display'",fontSize:30,fontWeight:600,color:'var(--text)'}}>Bom dia, Levi! </h1>
                <p style={{fontSize:13,color:'var(--text-light)',fontFamily:"'Poppins'",marginTop:3}}>Domingo, 4 de Maio de 2026</p>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button style={{padding:'9px 18px',borderRadius:10,border:'1.5px solid var(--border)',background:'white',cursor:'pointer',fontSize:13,fontFamily:"'Poppins'",color:'var(--text)',display:'flex',alignItems:'center',gap:6}}>
                  <Icon name="bell" size={14} color="var(--text-mid)"/> 3 alertas
                </button>
                <button onClick={()=>setActiveSection('agenda')} style={{padding:'9px 18px',borderRadius:10,border:'none',background:'var(--gold)',cursor:'pointer',fontSize:13,fontFamily:"'Poppins'",color:'white',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
                  <Icon name="plus" size={14} color="white"/> Novo agend.
                </button>
              </div>
            </div>

            {/* KPI Cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
              {[
                {label:'Receita Hoje',val:fmt(dayRevenue),sub:'2 atend. concluídos',icon:'dollar',color:'oklch(72% 0.115 75)',bg:'oklch(97% 0.045 75)'},
                {label:'Agend. Hoje',val:'4',sub:'1 pendente',icon:'calendar',color:'oklch(60% 0.1 250)',bg:'oklch(97% 0.03 250)'},
                {label:'Receita Mensal',val:fmt(6840),sub:'+12% vs mês ant.',icon:'bar',color:'oklch(60% 0.1 145)',bg:'oklch(97% 0.03 145)'},
                {label:'Ticket Médio',val:fmt(118),sub:'Últimos 30 dias',icon:'info',color:'oklch(60% 0.1 320)',bg:'oklch(97% 0.03 320)'},
              ].map((k,i)=>(
                <div key={i} style={{background:'white',borderRadius:16,padding:'18px',border:'1px solid var(--border)',boxShadow:'0 1px 6px oklch(40% 0.04 340 / 0.05)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                    <p style={{fontSize:12,color:'var(--text-light)',fontFamily:"'Poppins'",fontWeight:500,letterSpacing:'0.03em'}}>{k.label}</p>
                    <div style={{width:32,height:32,borderRadius:8,background:k.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Icon name={k.icon} size={15} color={k.color}/>
                    </div>
                  </div>
                  <p style={{fontFamily:"'Playfair Display'",fontSize:26,fontWeight:600,color:'var(--text)'}}>{k.val}</p>
                  <p style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Poppins'",marginTop:4}}>{k.sub}</p>
                </div>
              ))}
            </div>

            {/* Today's appointments */}
            <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:20}}>
              <div style={{background:'white',borderRadius:16,padding:'20px',border:'1px solid var(--border)'}}>
                <h3 style={{fontFamily:"'Playfair Display'",fontSize:20,fontWeight:600,color:'var(--text)',marginBottom:16}}>Agenda de Hoje</h3>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {todayAppts.map((a,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:12,background:'oklch(98% 0.01 75)',border:'1px solid var(--border)'}}>
                      <div style={{width:44,height:44,borderRadius:10,background:'linear-gradient(135deg,oklch(88% 0.055 10),oklch(84% 0.065 350))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <span style={{fontSize:10,fontWeight:700,fontFamily:"'Poppins'",color:'var(--mauve)'}}>{a.time}</span>
                      </div>
                      <div style={{flex:1}}>
                        <p style={{fontSize:13,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'"}}>{a.name}</p>
                        <p style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Poppins'",marginTop:1}}>{a.svc}</p>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <p style={{fontSize:13,fontWeight:700,color:'var(--gold)',fontFamily:"'Poppins'"}}>{fmt(a.price)}</p>
                        <span style={{fontSize:10,fontWeight:600,fontFamily:"'Poppins'",padding:'2px 8px',borderRadius:10,background:a.status==='concluído'?'oklch(92% 0.06 145)':a.status==='confirmado'?'oklch(92% 0.04 75)':'oklch(95% 0.03 60)',color:a.status==='concluído'?'oklch(38% 0.1 145)':a.status==='confirmado'?'oklch(55% 0.1 70)':'oklch(55% 0.08 60)'}}>
                          {a.status}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Fixed costs overview */}
              <div style={{background:'white',borderRadius:16,padding:'20px',border:'1px solid var(--border)'}}>
                <h3 style={{fontFamily:"'Playfair Display'",fontSize:20,fontWeight:600,color:'var(--text)',marginBottom:4}}>Custos Fixos/Mês</h3>
                <p style={{fontSize:12,color:'var(--text-light)',fontFamily:"'Poppins'",marginBottom:14}}>Total: <strong style={{color:'var(--text)'}}>{fmt(initialFixedCosts.reduce((a,c)=>a+c.val,0))}</strong></p>
                {initialFixedCosts.map((c,i)=>{
                  const total=initialFixedCosts.reduce((a,cc)=>a+cc.val,0);
                  return (
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <span style={{fontSize:12,color:'var(--text-mid)',fontFamily:"'Poppins'"}}>{c.name}</span>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:60,height:5,borderRadius:3,background:'var(--border)',overflow:'hidden'}}>
                          <div style={{width:`${(c.val/total)*100}%`,height:'100%',background:'linear-gradient(90deg,oklch(88% 0.055 10),var(--gold))',borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--text)',fontFamily:"'Poppins'",minWidth:60,textAlign:'right'}}>{fmt(c.val)}</span>
                      </div>
                    </div>
                  );
                })}
                <button onClick={()=>setActiveSection('financeiro')} style={{width:'100%',marginTop:12,padding:'10px',borderRadius:10,border:'1.5px solid var(--gold)',background:'transparent',cursor:'pointer',fontFamily:"'Poppins'",fontSize:12,fontWeight:600,color:'var(--gold)'}}>
                  Gerenciar Custos →
                </button>
              </div>
            </div>
          </div>
        )}

        {/* PRICING CALCULATOR */}
        {activeSection==='pricing' && (
          <PricingSection inputs={inputs} fmt={fmt} pct={pct}/>
        )}

                {/* INSUMOS */}
        {activeSection==='inputs' && (
          <InsumoSection inputs={inputs} setInputs={setInputs} fmt={fmt}/>
        )}

        {/* AGENDA (Owner) */}
        {activeSection==='agenda' && (
          <AgendaSection fmt={fmt}/>
        )}

        {/* FINANCEIRO */}
        {activeSection==='financeiro' && (
          <FinanceiroSection fmt={fmt}/>
        )}

        {/* SETTINGS */}
        {(activeSection==='settings') && (
          <SettingsSection salonConfig={salonConfig} setSalonConfig={setSalonConfig}/>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOT
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState('both');
  const [salonConfig, setSalonConfig] = React.useState(defaultSalonConfig);

  return (
    <div style={{minHeight:'100vh',background:'oklch(96% 0.01 75)',fontFamily:"'Poppins', sans-serif"}}>
      {/* Top bar */}
      <div style={{background:'white',borderBottom:'1px solid var(--border)',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:52,position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,oklch(88% 0.055 10),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}></div>
          <span style={{fontFamily:"'Playfair Display'",fontSize:20,fontWeight:600,color:'var(--mauve-dark)'}}>LevBeauty</span>
          <span style={{fontSize:10,color:'var(--text-light)',fontFamily:"'Poppins'",letterSpacing:'0.06em',marginLeft:4}}>PROTÓTIPO</span>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[{v:'client',label:'Cliente'},{v:'owner',label:'Gestor'},{v:'both',label:'Ambos'}].map(opt=>(
            <button key={opt.v} onClick={()=>setView(opt.v)}
              style={{padding:'6px 14px',borderRadius:8,border:`1.5px solid ${view===opt.v?'var(--gold)':'var(--border)'}`,background:view===opt.v?'var(--gold)':'white',cursor:'pointer',fontSize:12,fontFamily:"'Poppins'",fontWeight:view===opt.v?600:400,color:view===opt.v?'white':'var(--text)',transition:'all 0.2s'}}>
              {opt.label}
            </button>
          ))}
        </div>
      </div>

      {/* Layout */}
      <div style={{display:'flex',gap:0,height:'calc(100vh - 52px)',overflow:'hidden'}}>
        {/* CLIENT (phone) */}
        {(view==='both'||view==='client') && (
          <div style={{flex:view==='both'?'0 0 auto':1,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:view==='client'?'oklch(96% 0.015 75)':'oklch(94% 0.02 10 / 0.6)',borderRight:view==='both'?'1px solid var(--border)':'none',minWidth:view==='both'?420:0}}>
            <div style={{transform:'scale(0.88)',transformOrigin:'center center'}}>
              <IOSDevice width={375} height={812} dark={false}>
                <ClientApp tweaks={tweaks} salonConfig={salonConfig}/>
              </IOSDevice>
            </div>
          </div>
        )}

        {/* OWNER (desktop) */}
        {(view==='both'||view==='owner') && (
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            {view==='both'&&<div style={{padding:'10px 20px 6px',background:'white',borderBottom:'1px solid var(--border)'}}>
              <p style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Poppins'",letterSpacing:'0.06em',fontWeight:500}}>PAINEL DA PROPRIETÁRIA</p>
            </div>}
            <div style={{flex:1,overflow:'hidden'}}>
              <OwnerDashboard tweaks={tweaks} salonConfig={salonConfig} setSalonConfig={setSalonConfig}/>
            </div>
          </div>
        )}
      </div>

      <TweaksPanel>
        <TweakSection title="Visual">
          <TweakRadio label="Tipografia" value={tweaks.fontStyle} options={['cormorant','dm']} onChange={v=>setTweak('fontStyle',v)}/>
          <TweakRadio label="Densidade" value={tweaks.density} options={['comfortable','compact']} onChange={v=>setTweak('density',v)}/>
          <TweakToggle label="Acento Dourado" value={tweaks.accentGold} onChange={v=>setTweak('accentGold',v)}/>
          <TweakToggle label="Animações" value={tweaks.animationsOn} onChange={v=>setTweak('animationsOn',v)}/>
        </TweakSection>
        <TweakSection title="Paleta">
          <TweakRadio label="Tom Principal" value={tweaks.primaryColor} options={['blush','mauve','sage']} onChange={v=>setTweak('primaryColor',v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
